<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="زاد المحظرة — منصة الطلاب الموريتانيين">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="زاد المحظرة">
  <meta name="theme-color" content="#1D5B3C">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>زاد المحظرة</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Boot loader, removed from paint order once Flutter's opaque
       Scaffold covers it — no JS hook needed. */
    #boot-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF8F4;
      font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    }
    #boot-loader .spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 14px;
      border: 4px solid rgba(29, 91, 60, 0.2);
      border-top-color: #1D5B3C;
      border-radius: 50%;
      animation: boot-spin 0.8s linear infinite;
    }
    #boot-loader p {
      margin: 0;
      color: #1D5B3C;
      font-size: 15px;
      text-align: center;
    }
    @keyframes boot-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="boot-loader">
    <div>
      <div class="spinner"></div>
      <p>جار تحميل زاد المحظرة...</p>
    </div>
  </div>
  <script>
    // Keep Flutter Web on one routing strategy: hash routes only.
    // Direct SPA paths served by Vercel, e.g. /home, become /#/home before
    // Flutter starts so GoRouter redirects never produce /home#/login.
    (function () {
      if (location.hash || location.pathname === '/') return;
      var hashPath = location.pathname + location.search;
      location.replace('/#' + hashPath);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
